[pytest]
# COMPATIBILITY SHIM ONLY
# Canonical pytest configuration is at repository root: pytest.ini
# Keep this shim minimal for legacy workflows that still pass:
#   pytest -c config/pytest.ini ...
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .runtime_tmp/.pytest_cache
norecursedirs = archive .runtime_tmp .tmp* .venv
