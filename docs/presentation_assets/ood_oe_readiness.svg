<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="1400" height="760" rx="36" fill="#FAFAF8"/><text x="700" y="70" font-family="Arial" font-size="42" font-weight="700" text-anchor="middle" fill="#2C2C2C">OOD vs OE and Readiness Evidence</text><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#555"/></marker></defs><rect x="95" y="160" width="330" height="430" rx="30" fill="#FFE7E7" stroke="#B84A4A" stroke-width="5"/><text x="260" y="220" font-family="Arial" font-size="34" font-weight="700" text-anchor="middle" fill="#5B1F1F">OOD</text><text x="260" y="270" font-family="Arial" font-size="24" font-weight="700" text-anchor="middle" fill="#5B1F1F">Final evidence</text><text x="260" y="325" font-family="Arial" font-size="21" text-anchor="middle" fill="#5B1F1F">unsupported diseases</text><text x="260" y="360" font-family="Arial" font-size="21" text-anchor="middle" fill="#5B1F1F">off-crop images</text><text x="260" y="395" font-family="Arial" font-size="21" text-anchor="middle" fill="#5B1F1F">blur / clutter / non-target</text><text x="260" y="455" font-family="Arial" font-size="22" font-weight="700" text-anchor="middle" fill="#5B1F1F">Used to judge:</text><text x="260" y="495" font-family="Arial" font-size="21" text-anchor="middle" fill="#5B1F1F">Can the adapter reject</text><text x="260" y="528" font-family="Arial" font-size="21" text-anchor="middle" fill="#5B1F1F">unsupported inputs?</text><rect x="535" y="160" width="330" height="430" rx="30" fill="#E7F0FF" stroke="#3B5FA8" stroke-width="5"/><text x="700" y="220" font-family="Arial" font-size="34" font-weight="700" text-anchor="middle" fill="#1C3261">OE</text><text x="700" y="270" font-family="Arial" font-size="24" font-weight="700" text-anchor="middle" fill="#1C3261">Training support</text><text x="700" y="325" font-family="Arial" font-size="21" text-anchor="middle" fill="#1C3261">auxiliary outliers</text><text x="700" y="360" font-family="Arial" font-size="21" text-anchor="middle" fill="#1C3261">not supported classes</text><text x="700" y="395" font-family="Arial" font-size="21" text-anchor="middle" fill="#1C3261">not final evidence</text><text x="700" y="455" font-family="Arial" font-size="22" font-weight="700" text-anchor="middle" fill="#1C3261">Used to teach:</text><text x="700" y="495" font-family="Arial" font-size="21" text-anchor="middle" fill="#1C3261">less confident outputs</text><text x="700" y="528" font-family="Arial" font-size="21" text-anchor="middle" fill="#1C3261">on outlier-like inputs</text><rect x="975" y="160" width="330" height="430" rx="30" fill="#E6F5EA" stroke="#2F6B55" stroke-width="5"/><text x="1140" y="220" font-family="Arial" font-size="34" font-weight="700" text-anchor="middle" fill="#173B2F">Readiness</text><text x="1140" y="270" font-family="Arial" font-size="24" font-weight="700" text-anchor="middle" fill="#173B2F">Go / no-go verdict</text><text x="1140" y="325" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">classification metrics</text><text x="1140" y="360" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">real OOD evidence</text><text x="1140" y="395" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">missing requirements</text><text x="1140" y="455" font-family="Arial" font-size="22" font-weight="700" text-anchor="middle" fill="#173B2F">Output:</text><text x="1140" y="495" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">production_readiness.json</text><text x="1140" y="528" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">ready / provisional / failed</text><g stroke="#555" stroke-width="6" marker-end="url(#arrow)"><line x1="425" y1="375" x2="525" y2="375"/><line x1="865" y1="375" x2="965" y2="375"/></g><path d="M500 620 H900" stroke="#B84A4A" stroke-width="7" stroke-linecap="round"/><text x="700" y="665" font-family="Arial" font-size="27" font-weight="700" text-anchor="middle" fill="#B84A4A">Critical rule: OE images must stay disjoint from final OOD evidence</text></svg>