<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="1400" height="760" rx="36" fill="#F7FBFC"/><text x="700" y="70" font-family="Arial" font-size="42" font-weight="700" text-anchor="middle" fill="#15343E">Router-Guided Inference Flow</text><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2A6F84"/></marker></defs><rect x="70" y="180" width="220" height="150" rx="26" fill="#FFFFFF" stroke="#2A6F84" stroke-width="5"/><text x="180" y="240" font-family="Arial" font-size="26" font-weight="700" text-anchor="middle" fill="#15343E">Input Image</text><text x="180" y="280" font-family="Arial" font-size="21" text-anchor="middle" fill="#15343E">plant / non-plant</text><rect x="360" y="145" width="250" height="220" rx="26" fill="#E9F7FF" stroke="#2A6F84" stroke-width="5"/><text x="485" y="205" font-family="Arial" font-size="28" font-weight="700" text-anchor="middle" fill="#15343E">Router</text><text x="485" y="250" font-family="Arial" font-size="21" text-anchor="middle" fill="#15343E">crop detection</text><text x="485" y="285" font-family="Arial" font-size="21" text-anchor="middle" fill="#15343E">part detection</text><text x="485" y="320" font-family="Arial" font-size="21" text-anchor="middle" fill="#15343E">confidence + margin</text><polygon points="745,145 900,255 745,365 590,255" fill="#FFF4D8" stroke="#B07800" stroke-width="5"/><text x="745" y="242" font-family="Arial" font-size="25" font-weight="700" text-anchor="middle" fill="#4A3400">Accept?</text><text x="745" y="278" font-family="Arial" font-size="20" text-anchor="middle" fill="#4A3400">supported crop</text><text x="745" y="305" font-family="Arial" font-size="20" text-anchor="middle" fill="#4A3400">compatible part</text><rect x="1010" y="145" width="270" height="220" rx="26" fill="#DDF6E9" stroke="#2F6B55" stroke-width="5"/><text x="1145" y="205" font-family="Arial" font-size="28" font-weight="700" text-anchor="middle" fill="#173B2F">Adapter</text><text x="1145" y="250" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">crop-specific</text><text x="1145" y="285" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">class prediction</text><text x="1145" y="320" font-family="Arial" font-size="21" text-anchor="middle" fill="#173B2F">OOD analysis</text><rect x="590" y="500" width="310" height="130" rx="26" fill="#FFE7E7" stroke="#B84A4A" stroke-width="5"/><text x="745" y="555" font-family="Arial" font-size="28" font-weight="700" text-anchor="middle" fill="#5B1F1F">Abstain / Reject</text><text x="745" y="595" font-family="Arial" font-size="21" text-anchor="middle" fill="#5B1F1F">no forced prediction</text><g stroke="#2A6F84" stroke-width="6" marker-end="url(#arrow)"><line x1="290" y1="255" x2="350" y2="255"/><line x1="610" y1="255" x2="585" y2="255"/><line x1="900" y1="255" x2="1000" y2="255"/></g><line x1="745" y1="365" x2="745" y2="490" stroke="#B84A4A" stroke-width="6" marker-end="url(#arrow)"/><text x="956" y="230" font-family="Arial" font-size="22" font-weight="700" fill="#2F6B55">yes</text><text x="765" y="450" font-family="Arial" font-size="22" font-weight="700" fill="#B84A4A">no / uncertain</text><text x="700" y="700" font-family="Arial" font-size="27" font-weight="700" text-anchor="middle" fill="#15343E">Router controls input eligibility; adapter handles class prediction and OOD after acceptance</text></svg>