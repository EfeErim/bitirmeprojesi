    <rect x="100" y="650" width="1415" height="95" rx="22" fill="#102c40"/>
    <text x="145" y="708" fill="#fff" font-size="24">Result:</text><text x="245" y="708" fill="#9fb5c8" font-size="24">lower retraining cost, modular crop adapters and controlled uncertainty.</text>
