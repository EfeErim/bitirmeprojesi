    <g fill="#fff" font-size="31" font-weight="700"><text x="140" y="420">DINOv3</text><text x="140" y="460">backbone</text><text x="570" y="420">SD-LoRA</text><text x="570" y="460">adapter</text><text x="1000" y="420">Crop-specific</text><text x="1000" y="460">classifier</text></g>
    <g fill="#9fb5c8" font-size="20"><text x="140" y="505">Reusable visual features</text><text x="570" y="505">Small efficient updates</text><text x="1000" y="505">Disease + OOD state</text></g>
