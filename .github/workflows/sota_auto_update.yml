name: SOTA Update

on:
  schedule:
    - cron: '0 2 * * 1' # weekly at 02:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run SOTA update script
        run: |
          python scripts/update_sota_references.py --output docs/SOTA_AUTOMATION_UPDATES.md

      - name: Commit and push candidate report
        run: |
          if git diff --quiet -- docs/SOTA_AUTOMATION_UPDATES.md; then
            echo "No SOTA candidate report changes to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/SOTA_AUTOMATION_UPDATES.md
          git commit -m "chore(sota): automated literature update"
          git push origin "HEAD:${GITHUB_REF_NAME}"
