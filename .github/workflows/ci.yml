name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Validate notebook/runtime imports
        run: python scripts/validate_notebook_imports.py

      - name: Run unit tests
        run: pytest tests/unit tests/colab/test_smoke_training.py -q

      - name: Run integration tests
        run: pytest tests/integration -q --runintegration
