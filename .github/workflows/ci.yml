name: CI
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock
    
    - name: Validate configuration
      run: |
        python scripts/profile_policy_sanity.py
    
    - name: Run modular test suites
      run: |
        rm -f .coverage coverage.xml
        python scripts/run_test_suites.py \
          --suite unit \
          --suite colab \
          --suite integration/core \
          --pytest-arg=--cov=src \
          --pytest-arg=--cov-append \
          --pytest-arg=--cov-report=term-missing
        python -m coverage xml
        python -m coverage html

    - name: Static legacy-token guard
      run: |
        if rg -n "DoRA|CoNeC|phase1|phase3|load_in_4bit|nf4|QLoRA" src config colab_notebooks scripts docs -g "!**/archive/**"; then
          echo "Legacy tokens detected in non-archive paths."
          exit 1
        fi

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  policy-regression:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run policy regression bundle
      run: |
        python scripts/run_policy_regression_bundle.py

  markdown-links:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Check markdown links
      run: |
        python scripts/check_markdown_links.py --root .

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8
    
    - name: Run flake8
      run: |
        flake8 src/ tests/ scripts/ --max-line-length=120 --select=E9,F63,F7,F82 --exclude=tests/unit/utils/verify_optimizations.py,tests/unit/utils/verify_optimizations_simple.py

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit==1.8.6 safety==2.3.5
    
    - name: Run bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ -ll -ii
    
    - name: Run safety
      run: |
        safety check --json > safety-report.json
    
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  performance-guardrails:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-mock
    
    - name: Run Phase 5 router benchmark
      run: |
        python scripts/benchmark_router_phase5.py
    
    - name: Check performance guardrails
      run: |
        python scripts/check_phase5_perf_regression.py
    
    - name: Upload benchmark artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: phase5-benchmark-results
        path: logs/phase5_router_benchmark.json
