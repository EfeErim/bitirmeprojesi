name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
  - uses: actions/checkout@v4

  - name: Set up Python ${{ matrix.python-version }}
    uses: actions/setup-python@v4
    with:
      python-version: ${{ matrix.python-version }}
      cache: 'pip'
      cache-dependency-path: |
        requirements.txt
        requirements-dev.txt

  - name: Install system dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        curl \
        git \
        libssl-dev \
        pkg-config \
        python3-dev

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install pytest pytest-cov black flake8 mypy isort

  - name: Lint with flake8
    run: |
      flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  - name: Check formatting with black
    run: |
      black --check --line-length=127 .

  - name: Check imports with isort
    run: |
      isort --check-only --profile black .

  - name: Type check with mypy
    run: |
      mypy --install-types --non-interactive src/ tests/ || true

  - name: Test with pytest
    run: |
      pytest tests/ \
        --cov=src \
        --cov-report=xml \
        --cov-report=html \
        --cov-report=term \
        --cov-fail-under=70 \
        --tb=short \
        -v

  - name: Upload coverage to Codecov
    uses: codecov/codecov-action@v3
    with:
      file: ./coverage.xml
      flags: unittests
      name: codecov-umbrella

  - name: Archive test results
    if: always()
    uses: actions/upload-artifact@v3
    with:
      name: test-results-${{ matrix.python-version }}
      path: |
        htmlcov/
        coverage.xml

  security:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
  - uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.11'
      cache: 'pip'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install safety bandit

  - name: Run safety check
    run: |
      safety check --full-report

  - name: Run bandit security scan
    run: |
      bandit -r src/ -f json -o bandit-report.json || true

  - name: Upload security scan results
    if: always()
    uses: actions/upload-artifact@v3
    with:
      name: security-reports
      path: |
        bandit-report.json

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
  - uses: actions/checkout@v4

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}
    if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''

  - name: Build and push Docker image
    uses: docker/build-push-action@v5
    with:
      context: .
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      tags: |
        aadsulora/aads-ulora:latest
        aadsulora/aads-ulora:${{ github.sha }}
      cache-from: type=registry,ref=aadsulora/aads-ulora:latest
      cache-to: type=inline

  - name: Generate SBOM
    run: |
      pip install cyclonedx-bom
      cyclonedx-py --output bom.xml
    continue-on-error: true

  - name: Upload SBOM
    if: always()
    uses: actions/upload-artifact@v3
    with:
      name: sbom
      path: bom.xml