name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily cleanup at midnight UTC
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dependency-profile: [preferred, latest-patch]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Refresh latest validated patch dependencies
        if: matrix.dependency-profile == 'latest-patch'
        run: |
          pip install --upgrade \
            "torch>=2.10,<2.11" \
            "torchvision>=0.25,<0.26" \
            "transformers>=5.1,<5.2" \
            "peft>=0.18,<0.19" \
            "accelerate>=1.13,<1.14" \
            "huggingface-hub>=1.4,<1.5"

      - name: Show dependency profile
        run: |
          python - <<'PY'
          import importlib

          packages = [
              "torch",
              "torchvision",
              "transformers",
              "peft",
              "accelerate",
              "huggingface_hub",
          ]
          print("dependency_profile=${{ matrix.dependency-profile }}")
          for name in packages:
              module = importlib.import_module(name)
              print(f"{name}={getattr(module, '__version__', 'unknown')}")
          PY

      - name: Validate notebook/runtime imports
        run: python scripts/validate_notebook_imports.py

      - name: Validate config schema declarations
        run: python scripts/validate_config_schema.py

      - name: Check config drift
        run: python scripts/check_config_drift.py

      - name: Validate OOD evidence consistency
        run: python scripts/validate_ood_evidence_consistency.py --runs-root runs --output .runtime_tmp/ood_consistency_report.json

      - name: Validate router calibration stability
        run: python scripts/validate_router_calibration_stability.py --router-eval-root data/router_eval --output .runtime_tmp/router_calibration_stability_report.json

      - name: Validate adapter smoke contracts
        run: python scripts/colab_adapter_smoke_test.py --adapter-root models/adapters --output .runtime_tmp/adapter_smoke_test.json --strict

      - name: Validate dataset layouts (if present)
        run: |
          if [ -d "data/prepared_runtime_datasets" ]; then
            python scripts/validate_dataset_layout.py --root data/prepared_runtime_datasets
          else
            echo "No prepared runtime datasets found, skipping validation"
          fi

      - name: Run static checks
        run: |
          ruff check \
            scripts/benchmark_surfaces.py \
            scripts/cleanup_old_artifacts.py \
            scripts/check_config_drift.py \
            scripts/generate_artifact_manifest.py \
            scripts/validate_ood_evidence_consistency.py \
            scripts/validate_router_calibration_stability.py \
            scripts/colab_checkpointing.py \
            scripts/colab_adapter_smoke_test.py \
            scripts/colab_dataset_layout.py \
            scripts/colab_live_telemetry.py \
            scripts/colab_notebook_helpers.py \
            scripts/colab_router_adapter_inference.py \
            scripts/validate_config_schema.py \
            scripts/validate_notebook_imports.py \
            src/shared \
            src/data \
            src/training/services \
            src/training/continual_sd_lora.py \
            src/router \
            src/workflows \
            src/pipeline/router_adapter_runtime.py \
            src/pipeline/inference_payloads.py \
            src/adapter \
            src/core/config_manager.py \
            tests/unit/imports \
            tests/unit/shared \
            tests/unit/workflows \
            tests/unit/adapter/test_continual_adapter.py \
            tests/unit/pipeline/test_router_adapter_runtime.py
          mypy --follow-imports skip \
            src/shared \
            src/data \
            src/training/continual_sd_lora.py \
            src/router \
            src/workflows \
            src/pipeline/router_adapter_runtime.py \
            src/pipeline/inference_payloads.py \
            src/adapter \
            src/core/config_manager.py \
            scripts/benchmark_surfaces.py

      - name: Run unit tests
        run: pytest tests/unit tests/colab/test_smoke_training.py -q --cov=src --cov-branch --cov-report= --cov-fail-under=0

      - name: Run integration tests
        run: pytest tests/integration -q --runintegration --cov=src --cov-branch --cov-append --cov-report= --cov-fail-under=0

      - name: Enforce coverage gate
        run: |
          python -m coverage report
          python -m coverage xml -o .runtime_tmp/coverage.xml

      - name: Capture orchestration benchmarks
        run: python scripts/benchmark_surfaces.py --output .runtime_tmp/benchmarks.json

  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clean up old artifacts (>90 days)
        run: |
          python scripts/cleanup_old_artifacts.py --days 90
