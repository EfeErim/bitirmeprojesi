[pytest]
# Canonical pytest configuration for repository workflows.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .runtime_tmp/.pytest_cache
norecursedirs = archive .runtime_tmp .tmp* .venv
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
markers =
    unit: unit tests
    integration: integration tests
    slow: slow running tests
    heavy_model: tests that may download/load large external models; run only with --runheavymodel
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
