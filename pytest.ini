[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .runtime_tmp/.pytest_cache
norecursedirs = __pycache__ .runtime_tmp .venv
addopts =
    --tb=short
    --strict-markers
markers =
    integration: integration tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
